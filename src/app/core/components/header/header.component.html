<header class="fixed top-0 w-full bg-white/90 backdrop-blur-md z-50 border-b border-gray-100">
  <nav class="section-padding py-4">
    <div class="container-max flex items-center justify-between">
      <!-- Logo/Name -->
      <div class="flex items-center space-x-2">
        <h1 class="text-xl font-semibold text-gray-900">Ruan Heyns</h1>
        <span class="text-sm text-gray-500 hidden sm:block">• Full Stack Developer</span>
      </div>

      <!-- Navigation Links -->
      <nav class="hidden md:flex items-center space-x-8">
        <a href="#about" class="text-gray-600 hover:text-gray-900 transition-colors">About</a>
        <a href="#contact" class="text-gray-600 hover:text-gray-900 transition-colors">Contact</a>
        <a href="#contact" class="bg-primary-600 text-white px-4 py-2 rounded-lg hover:bg-primary-700 transition-colors">
          Get in Touch
        </a>
      </nav>

      <!-- Mobile Menu Button -->
      <button 
        class="md:hidden p-2 text-gray-600 hover:text-gray-900"
        (click)="toggleMobileMenu()"
        aria-label="Toggle menu">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" 
                d="M4 6h16M4 12h16M4 18h16"></path>
        </svg>
      </button>
    </div>

    <!-- Mobile Menu -->
    <div *ngIf="isMobileMenuOpen" class="md:hidden mt-4 pb-4 border-t border-gray-100">
      <div class="flex flex-col space-y-4 pt-4">
        <a href="#about" class="text-gray-600 hover:text-gray-900 transition-colors" 
           (click)="closeMobileMenu()">About</a>
        <a href="#contact" class="text-gray-600 hover:text-gray-900 transition-colors"
           (click)="closeMobileMenu()">Contact</a>
        <a href="#contact" class="bg-primary-600 text-white px-4 py-2 rounded-lg hover:bg-primary-700 transition-colors w-fit"
           (click)="closeMobileMenu()">Get in Touch</a>
      </div>
    </div>
  </nav>
</header>
